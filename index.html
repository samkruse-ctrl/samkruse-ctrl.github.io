<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kruse Interactive Media</title>
    <meta name="description" content="A simple, responsive homepage starter." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="Homepage">
          <span class="brand-name">Kruse Interactive Media Home Page</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a href="#features">Project 1</a>
          <a href="#about">Project 2</a>
          <a href="#contact">Project 3</a>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="hero">
        <div class="container hero-inner">
          <div class="hero-copy">
            <h1>This is my Home page</h1>
            <div class="hero-actions">
              <a class="button primary" href="#contact">flip screen</a>
              <a class="button" href="#features">dark mode</a>
            </div>
          </div>
        </div>
      </section>

    

     
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© <span id="year">2026</span> Sam Kruse. All rights reserved.</p>
        <a href="#main">Back to top</a>
      </div>
    </footer>

    <script>
      // Keep the footer year current with zero build tooling.
      document.getElementById("year").textContent = String(new Date().getFullYear());
    </script>
  </body>
</html>
