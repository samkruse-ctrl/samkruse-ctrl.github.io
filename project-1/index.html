<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project 1 — Creature Care</title>
  <link rel="stylesheet" href="https://use.typekit.net/zkx4wnx.css" />
  <link rel="stylesheet" href="project-1.css" />
</head>

<body>
  <main id="main">
    <div id="game-shell" class="game-shell">
      <div id="game-view" class="game-view game-layout">

        <div class="creature-viewport" aria-label="Creature viewport">
          <div id="bar-full-toast" class="toast toast--viewport-top is-hidden" role="status" aria-live="polite" hidden>
          </div>
          <div class="creature-viewport__stage">
            <div id="creature" class="creature is-hidden" aria-label="Creature" data-creature-stage="intro">
              <svg class="creature__placeholder" viewBox="0 0 120 120" width="120" height="120" aria-hidden="true"
                focusable="false">
                <g class="creature-phase creature-phase--intro" data-creature-phase="intro" visibility="hidden">
                  <ellipse cx="60" cy="58" rx="28" ry="36" fill="#e4e4e4" stroke="#bbb" stroke-width="2" />
                  <ellipse cx="60" cy="52" rx="8" ry="10" fill="#ccc" opacity="0.5" />
                </g>
                <g class="creature-phase creature-phase--feed" data-creature-phase="feed" visibility="hidden">
                  <ellipse cx="60" cy="68" rx="44" ry="38" fill="#e8e8e8" stroke="#bbb" stroke-width="2" />
                  <ellipse cx="60" cy="52" rx="36" ry="32" fill="#ececec" stroke="#bbb" stroke-width="2" />
                  <circle cx="44" cy="48" r="6" fill="#444" />
                  <circle cx="76" cy="48" r="6" fill="#444" />
                  <circle cx="46" cy="46" r="2" fill="#fafafa" />
                  <circle cx="78" cy="46" r="2" fill="#fafafa" />
                  <path d="M 48 64 Q 60 72 72 64" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" />
                </g>
                <g class="creature-phase creature-phase--play" data-creature-phase="play" visibility="hidden">
                  <ellipse cx="60" cy="68" rx="44" ry="38" fill="#e8e8e8" stroke="#bbb" stroke-width="2" />
                  <ellipse cx="60" cy="52" rx="36" ry="32" fill="#ececec" stroke="#bbb" stroke-width="2" />
                  <circle cx="44" cy="48" r="6" fill="#444" />
                  <circle cx="76" cy="48" r="6" fill="#444" />
                  <path d="M 48 64 Q 60 72 72 64" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" />
                  <circle cx="92" cy="78" r="12" fill="#f0c674" stroke="#c9a227" stroke-width="2" />
                </g>
                <g class="creature-phase creature-phase--travel" data-creature-phase="travel" visibility="hidden">
                  <ellipse cx="60" cy="68" rx="44" ry="38" fill="#e2f0e6" stroke="#7a9" stroke-width="2" />
                  <ellipse cx="60" cy="52" rx="36" ry="32" fill="#eef6f0" stroke="#7a9" stroke-width="2" />
                  <circle cx="44" cy="48" r="6" fill="#444" />
                  <circle cx="76" cy="48" r="6" fill="#444" />
                  <path d="M 48 64 Q 60 72 72 64" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" />
                  <path d="M 28 88 L 44 62 L 60 88 L 76 62 L 92 88 Z" fill="none" stroke="#7a9" stroke-width="2.5"
                    stroke-linejoin="round" />
                </g>
                <g class="creature-phase creature-phase--final" data-creature-phase="final" visibility="hidden">
                  <ellipse cx="60" cy="68" rx="44" ry="38" fill="#ebe6f4" stroke="#978" stroke-width="2" />
                  <ellipse cx="60" cy="52" rx="36" ry="32" fill="#f2eef9" stroke="#978" stroke-width="2" />
                  <circle cx="44" cy="48" r="6" fill="#444" />
                  <circle cx="76" cy="48" r="6" fill="#444" />
                  <path d="M 48 64 Q 60 72 72 64" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" />
                  <rect x="78" y="58" width="22" height="28" rx="2" fill="#f6f6f6" stroke="#888" stroke-width="1.5" />
                  <line x1="82" y1="64" x2="96" y2="64" stroke="#888" stroke-width="1" />
                  <line x1="82" y1="70" x2="94" y2="70" stroke="#888" stroke-width="1" />
                </g>
              </svg>
            </div>
          </div>
          <div id="creature-viewport-bars" class="creature-viewport__bars is-hidden" role="group" aria-label="Progress"
            aria-hidden="true">
            <label id="bar-row-feed" class="bar-row">
              <span>++Nourishment</span>
              <progress id="bar-feed" max="100" value="0">0</progress>
            </label>
            <label id="bar-row-play" class="bar-row is-hidden" data-unlocks-at-stage="2">
              <span>++Entertainment</span>
              <progress id="bar-play" max="100" value="0">0</progress>
            </label>
            <label id="bar-row-travel" class="bar-row is-hidden" data-unlocks-at-stage="3">
              <span>++Exploration</span>
              <progress id="bar-travel" max="100" value="0">0</progress>
            </label>
            <label id="bar-row-final" class="bar-row is-hidden" data-unlocks-at-stage="4">
              <span>++Knowledge</span>
              <progress id="bar-final" max="100" value="0">0</progress>
            </label>
          </div>
        </div>

        <div id="toolbar-container" class="toolbar-container" role="toolbar" aria-label="Actions">
          <div class="toolbar toolbar--game">
            <div class="toolbar-slot" id="toolbar-slot-feed">
              <div class="toolbar-slot__cluster toolbar-slot__cluster--tool-hidden">
                <img src="img/ico-food.svg" class="toolbar-slot__icon" aria-hidden="true" focusable="false" alt="Food" />
                <span class="toolbar-slot__shadow-area" aria-hidden="true"></span>
                <span class="toolbar-slot__label">Food</span>
                <button type="button" class="toolbar-slot__hit" id="btn-tool-feed" title="Feed" disabled
                  aria-label="Feed"></button>
              </div>
            </div>
            <div class="toolbar-slot" id="toolbar-slot-play">
              <div class="toolbar-slot__cluster toolbar-slot__cluster--tool-hidden">
                <img src="img/ico-play.svg" class="toolbar-slot__icon" aria-hidden="true" focusable="false" alt="Play" />
                <span class="toolbar-slot__shadow-area" aria-hidden="true"></span>
                <span class="toolbar-slot__label">Play</span>
                <button type="button" class="toolbar-slot__hit" id="btn-tool-play" title="Play" disabled
                  aria-label="Play"></button>
              </div>
            </div>
            <div class="toolbar-slot" id="toolbar-slot-travel">
              <div class="toolbar-slot__cluster toolbar-slot__cluster--tool-hidden">
                <img src="img/ico-travel.svg" class="toolbar-slot__icon" aria-hidden="true" focusable="false" alt="Travel" />
                <span class="toolbar-slot__shadow-area" aria-hidden="true"></span>
                <span class="toolbar-slot__label">Travel</span>
                <button type="button" class="toolbar-slot__hit" id="btn-tool-travel" title="Travel" disabled
                  aria-label="Travel"></button>
              </div>
            </div>
            <div class="toolbar-slot" id="toolbar-slot-knowledge">
              <div class="toolbar-slot__cluster toolbar-slot__cluster--tool-hidden">
                <img src="img/ico-read.svg" class="toolbar-slot__icon" aria-hidden="true" focusable="false" alt="Read" />
                <span class="toolbar-slot__shadow-area" aria-hidden="true"></span>
                <span class="toolbar-slot__label">Read</span>
                <button type="button" class="toolbar-slot__hit" id="btn-tool-final" title="Read" disabled
                  aria-label="Read"></button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="intro-layer" class="intro-layer" aria-live="polite">
        <div id="intro-popup" class="popup intro-popup--fit-game" role="dialog" aria-modal="true"
          aria-labelledby="intro-title">
          <p id="intro-popup-content"></p>
          <span id="intro-popup-continue" class="continue-span"></span>
        </div>
      </div>

      <div id="stage-popup-layer" class="stage-popup-layer is-hidden" hidden aria-live="polite">
        <div id="stage-popup" class="popup" role="dialog" aria-modal="true">
          <div id="stage-popup-default" class="stage-popup__default popup--aside-layout">
            <div class="popup__main">
              <p id="stage-popup-content"></p>
              <span id="stage-popup-continue" class="continue-span"></span>
            </div>
            <div class="popup__aside" aria-hidden="true">
              <img id="stage-popup-image" src="" class="popup-aside__svg" alt="Illustration" />
              <img id="stage-popup-image-alt" src="" class="popup-aside__svg" alt="Illustration" />
            </div>
          </div>
        </div>
      </div>

      <div id="finale-layer" class="finale-layer is-hidden" hidden aria-live="polite">
        <div id="finale-cutscene" class="finale-cutscene" aria-hidden="true">
          <div class="finale-cutscene__frame is-active" data-frame="0" aria-hidden="false">Frame 1</div>
          <div class="finale-cutscene__frame" data-frame="1" aria-hidden="true">Frame 2</div>
          <div class="finale-cutscene__frame" data-frame="2" aria-hidden="true">Frame 3</div>
          <div class="finale-cutscene__frame" data-frame="3" aria-hidden="true">Frame 4</div>
          <div class="finale-cutscene__frame" data-frame="4" aria-hidden="true">Frame 5</div>
          <div class="finale-cutscene__frame" data-frame="5" aria-hidden="true">Frame 6</div>
          <div class="finale-cutscene__frame" data-frame="6" aria-hidden="true">Frame 7</div>
          <div class="finale-cutscene__frame" data-frame="7" aria-hidden="true">Frame 8</div>
        </div>
      </div>
    </div>

    <div id="intro-seq-layer" class="stage-popup-layer intro-seq-layer is-hidden" hidden aria-live="polite">
      <div id="intro-seq-popup" class="popup" role="dialog" aria-modal="true">
        <div class="popup--aside-layout">
          <div class="popup__main">
            <p id="intro-seq-content"></p>
            <span id="intro-seq-continue" class="continue-span"></span>
          </div>
          <div class="popup__aside" aria-hidden="true">
            <img id="intro-seq-image" src="" class="popup-aside__svg" alt="Illustration" />
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="project-1.js" type="module"></script>
</body>

</html>
